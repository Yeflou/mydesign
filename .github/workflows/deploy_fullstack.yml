name: Deploy Fullstack to nekovps

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fullstack Repo
        uses: actions/checkout@v4
        with:
          repository: Yeflou/porto-versi-fullstack
          ref: main

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 147.93.159.42 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync static files
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ deploy@147.93.159.42:porto/html/

      - name: Reload nginx (pick up new files)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@147.93.159.42 \
            'docker exec porto nginx -s reload || true'
